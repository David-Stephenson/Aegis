services:
  aegis:
    image: ghcr.io/david-stephenson/aegis:latest
    container_name: aegis
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      AUTH_SECRET: ${AUTH_SECRET}
      AUTH_AUTHENTIK_ISSUER: ${AUTH_AUTHENTIK_ISSUER}
      AUTH_AUTHENTIK_CLIENT_ID: ${AUTH_AUTHENTIK_CLIENT_ID}
      AUTH_AUTHENTIK_CLIENT_SECRET: ${AUTH_AUTHENTIK_CLIENT_SECRET}
      AUTHENTIK_API_BASE_URL: ${AUTHENTIK_API_BASE_URL}
      AUTHENTIK_API_TOKEN: ${AUTHENTIK_API_TOKEN}
      CADDY_API_BASE_URL: ${CADDY_API_BASE_URL}
      CADDY_API_TOKEN: ${CADDY_API_TOKEN}
      TRUSTED_PROXY_CIDRS: ${TRUSTED_PROXY_CIDRS}
      DB_PATH: ${DB_PATH}
      GROUP_SERVICE_MAP_JSON: ${GROUP_SERVICE_MAP_JSON}
    volumes:
      - ./data:/app/data
